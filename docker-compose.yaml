services:

  url-shortener-postgres:
    image: postgres:17
    container_name: url-shortener-postgres

    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      
    volumes:
      - "${PROJECT_ROOT}/out/pgdata:/var/lib/postgresql/data"
    ports:
      - "127.0.0.1:5432:5432"
    restart: always